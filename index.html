<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Day Basel</title>

<style>

:root{
    --sand:#B98C3C;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Segoe UI, Arial, sans-serif;
    background:transparent;
}

.container{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
}

.hero{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.overlay{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    align-items:center;

    background:
    linear-gradient(
        to top,
        rgba(0,0,0,.85),
        rgba(0,0,0,.10)
    );

    padding-bottom:12px;
}

.title{
    color:white;
    font-size:18px;
    font-weight:700;
    text-align:center;
}

.date{
    color:var(--sand);
    font-size:10px;
    font-weight:600;
    margin-top:2px;
}

.countdownText{
    color:white;
    font-size:22px;
    font-weight:700;
    line-height:1.2;
    text-align:center;
    margin-top:8px;
}

.countdownText span{
    color:var(--sand);
}

.footer{
    margin-top:6px;
    color:white;
    font-size:9px;
    opacity:.9;
}

.finished{
    color:white;
    font-size:18px;
    font-weight:700;
    text-align:center;
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <img src="bg1.png" class="hero" alt="Career Day Basel">

        <div class="overlay">

            <div class="title">
                Career Day Basel
            </div>

            <div class="date">
                16–18 June 2026
            </div>

            <div id="countdownText" class="countdownText">
                Loading...
            </div>

            <div class="footer">
                Explore • Connect • Grow
            </div>

        </div>

    </div>

</div>

<script>

const targetDate =
new Date("2026-06-15T23:59:59");

function updateCountdown(){

    const now = new Date();
    const difference = targetDate - now;

    if(difference <= 0){

        document.querySelector(".overlay").innerHTML = `
            <div class="finished">
                🎉 Career Day Basel is here!
            </div>
        `;

        return;
    }

    const days =
    Math.floor(difference / (1000 * 60 * 60 * 24));

    const hours =
    Math.floor(
        (difference %
        (1000 * 60 * 60 * 24))
        /
        (1000 * 60 * 60)
    );

    const minutes =
    Math.floor(
        (difference %
        (1000 * 60 * 60))
        /
        (1000 * 60)
    );

    const seconds =
    Math.floor(
        (difference %
        (1000 * 60))
        /
        1000
    );

    document.getElementById("countdownText").innerHTML =
    `
    <span>${days}D</span> ${hours}H<br>
    <span>${minutes}M</span> ${seconds}S
    `;
}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
