```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Career Day Basel</title>

<style>

:root{
    --sand:#B98C3C;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    background:url('bg1.png') center center / cover no-repeat;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.55);
}

.container{
    position:relative;
    z-index:2;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:10px;
}

.title{
    color:white;
    font-size:20px;
    font-weight:700;
    margin-bottom:4px;
}

.date{
    color:var(--sand);
    font-size:11px;
    font-weight:600;
    margin-bottom:10px;
}

.countdown{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
    width:100%;
    max-width:220px;
}

.box{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    border-radius:8px;
    padding:6px;
    backdrop-filter:blur(8px);
}

.number{
    color:white;
    font-size:18px;
    font-weight:700;
    line-height:1;
}

.label{
    color:var(--sand);
    font-size:8px;
    text-transform:uppercase;
    letter-spacing:.08em;
    margin-top:2px;
}

.footer{
    margin-top:8px;
    color:white;
    font-size:9px;
    opacity:.9;
}

.finished{
    color:white;
    font-size:18px;
    font-weight:700;
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        Career Day Basel
    </div>

    <div class="date">
        16–18 June 2026
    </div>

    <div id="countdown" class="countdown">

        <div class="box">
            <div id="days" class="number">0</div>
            <div class="label">Days</div>
        </div>

        <div class="box">
            <div id="hours" class="number">0</div>
            <div class="label">Hours</div>
        </div>

        <div class="box">
            <div id="minutes" class="number">0</div>
            <div class="label">Minutes</div>
        </div>

        <div class="box">
            <div id="seconds" class="number">0</div>
            <div class="label">Seconds</div>
        </div>

    </div>

    <div class="footer">
        Explore • Connect • Grow
    </div>

</div>

<script>

const targetDate =
new Date("2026-06-15T23:59:59");

function updateCountdown(){

    const now = new Date();
    const difference = targetDate - now;

    if(difference <= 0){

        document.querySelector(".container").innerHTML = `
            <div class="finished">
                🎉 Career Day Basel is here!
            </div>
        `;

        return;
    }

    const days =
    Math.floor(difference / (1000 * 60 * 60 * 24));

    const hours =
    Math.floor(
        (difference %
        (1000 * 60 * 60 * 24))
        /
        (1000 * 60 * 60)
    );

    const minutes =
    Math.floor(
        (difference %
        (1000 * 60 * 60))
        /
        (1000 * 60)
    );

    const seconds =
    Math.floor(
        (difference %
        (1000 * 60))
        /
        1000
    );

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = hours;
    document.getElementById("minutes").textContent = minutes;
    document.getElementById("seconds").textContent = seconds;
}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
```
