```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Day Basel</title>

<style>

:root{
    --sand:#B98C3C;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    background:url('bg1.png') center center / cover no-repeat;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.60);
}

.container{
    position:relative;
    z-index:2;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:10px;
}

.title{
    color:white;
    font-size:18px;
    font-weight:700;
    margin-bottom:4px;
}

.date{
    color:var(--sand);
    font-size:11px;
    font-weight:600;
    margin-bottom:10px;
}

.countdownText{
    color:white;
    font-size:22px;
    font-weight:700;
    line-height:1.3;
    margin-bottom:8px;
}

.countdownText span{
    color:var(--sand);
}

.footer{
    color:white;
    font-size:9px;
    opacity:.9;
}

.finished{
    color:white;
    font-size:18px;
    font-weight:700;
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        Career Day Basel
    </div>

    <div class="date">
        16–18 June 2026
    </div>

    <div id="countdownText" class="countdownText">
        Loading...
    </div>

    <div class="footer">
        Explore • Connect • Grow
    </div>

</div>

<script>

const targetDate =
new Date("2026-06-15T23:59:59");

function updateCountdown(){

    const now = new Date();
    const difference = targetDate - now;

    if(difference <= 0){

        document.querySelector(".container").innerHTML = `
            <div class="finished">
                🎉 Career Day Basel is here!
            </div>
        `;

        return;
    }

    const days =
    Math.floor(difference / (1000 * 60 * 60 * 24));

    const hours =
    Math.floor(
        (difference %
        (1000 * 60 * 60 * 24))
        /
        (1000 * 60 * 60)
    );

    const minutes =
    Math.floor(
        (difference %
        (1000 * 60 * 60))
        /
        (1000 * 60)
    );

    const seconds =
    Math.floor(
        (difference %
        (1000 * 60))
        /
        1000
    );

    document.getElementById("countdownText").innerHTML =
    `
    <span>${days}D</span> ${hours}H<br>
    <span>${minutes}M</span> ${seconds}S
    `;
}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
```
